name: mahfadha_companion
description: "Xypheronix — one universal vault companion app for desktop (Windows/macOS/Linux), phones (Android/iOS) and web, paired with the hardware security key."
publish_to: 'none'

version: 3.1.4+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_libserialport: ^0.3.0
  file_picker: ^8.3.2
  csv: ^6.0.0
  http: ^1.2.2
  crypto: ^3.0.6
  provider: ^6.1.2
  window_manager: ^0.5.1
  tray_manager: ^0.5.2
  windows_single_instance: ^1.1.0
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  lottie: ^3.1.0
  package_info_plus: ^8.0.0
  shared_preferences: ^2.2.3
  encrypt: ^5.0.3
  audioplayers: ^6.0.0
  otp: ^3.1.4
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  image_path: "../assets/marketing/ciphervault_app_icon.png"
  windows:
    generate: true
    image_path: "../assets/marketing/ciphervault_app_icon.png"
    icon_size: 48
  android: true

flutter:
  uses-material-design: true
  assets:
    - assets/tray/
