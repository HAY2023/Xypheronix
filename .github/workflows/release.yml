name: Build and Release Xypheronix

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Install bridge build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyserial

      - name: Build CLI bridge
        run: |
          cd cli-bridge
          pyinstaller --onefile --name xypheronix_bridge --clean --noconsole mahfadha_bridge.py

      - name: Generate platform files
        run: |
          cd app
          flutter create --project-name xypheronix --platforms=windows,android .

      - name: Build Windows application
        run: |
          cd app
          flutter pub get
          flutter pub run flutter_launcher_icons
          flutter build windows --release

      - name: Build Android APK
        run: |
          cd app
          flutter build apk --release

      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          $vcRedistUrl = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          Write-Host "Downloading Visual C++ Redistributable..."
          Invoke-WebRequest -Uri $vcRedistUrl -OutFile "installer\vc_redist.x64.exe" -UseBasicParsing
          if (Test-Path "installer\vc_redist.x64.exe") {
            $size = (Get-Item "installer\vc_redist.x64.exe").Length / 1MB
            Write-Host "Downloaded vc_redist.x64.exe (${size:.1}MB)"
          } else {
            Write-Host "ERROR: Failed to download VC++ Redistributable"
            exit 1
          }

      - name: Prepare release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force "release-assets" | Out-Null
          New-Item -ItemType Directory -Force "release-assets\portable" | Out-Null

          $releaseTag = if ($env:GITHUB_REF_TYPE -eq "tag") {
            $env:GITHUB_REF_NAME
          } else {
            "manual-$($env:GITHUB_RUN_NUMBER)"
          }

          $releaseUrl = if ($env:GITHUB_REF_TYPE -eq "tag") {
            "$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/releases/tag/$releaseTag"
          } else {
            "$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/actions/runs/$($env:GITHUB_RUN_ID)"
          }

          # ── Find Flutter release directory ──
          $releaseDir = $null
          $x64Path = "app\build\windows\x64\runner\Release"
          $legacyPath = "app\build\windows\runner\Release"

          if (Test-Path $x64Path) {
            $releaseDir = $x64Path
          } elseif (Test-Path $legacyPath) {
            $releaseDir = $legacyPath
          } else {
            Write-Host "ERROR: Could not find Flutter release directory."
            exit 1
          }

          Write-Host "Found Flutter release at: $releaseDir"

          # ── Copy Flutter output to portable ──
          Copy-Item "$releaseDir\*" "release-assets\portable\" -Recurse -Force

          # ── Rename exe to Xypheronix.exe ──
          $rawExe = Get-ChildItem "release-assets\portable\*.exe" | Select-Object -First 1
          if (-not $rawExe) {
            Write-Host "ERROR: No application exe found in portable output."
            exit 1
          }

          if ($rawExe.Name -ne "Xypheronix.exe") {
            Rename-Item $rawExe.FullName "Xypheronix.exe"
          }

          # ── Copy CLI bridge ──
          Copy-Item "cli-bridge\dist\xypheronix_bridge.exe" "release-assets\portable\" -Force

          # ── Create portable ZIP ──
          Compress-Archive `
            -Path "release-assets\portable\*" `
            -DestinationPath "release-assets\Xypheronix-Windows.zip" `
            -Force

          # ── Build installer ──
          New-Item -ItemType Directory -Force "installer\flutter-release" | Out-Null
          Copy-Item "release-assets\portable\*" "installer\flutter-release\" -Recurse -Force
          Copy-Item "cli-bridge\dist\xypheronix_bridge.exe" "installer\" -Force

          iscc "installer\setup.iss"
          Copy-Item "installer-output\Xypheronix-Setup.exe" "release-assets\" -Force

          # ── Copy Android APK ──
          Copy-Item "app\build\app\outputs\flutter-apk\app-release.apk" "release-assets\Xypheronix.apk" -Force

          # ── SHA-256 Hashes ──
          $filesForHashes = @(
            "release-assets\Xypheronix-Setup.exe",
            "release-assets\Xypheronix-Windows.zip",
            "release-assets\Xypheronix.apk"
          )

          $hashMap = @{}
          $hashLines = @()
          foreach ($file in $filesForHashes) {
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
            $name = Split-Path $file -Leaf
            $hashMap[$name] = $hash
            $hashLines += "${name}: ${hash}"
          }

          Set-Content -Path "release-assets\SHA256SUMS.txt" -Value $hashLines

          # ── Release Manifest (latest.json) ──
          $manifest = @{
            schema_version = 1
            repository = $env:GITHUB_REPOSITORY
            version = $releaseTag
            published_at = (Get-Date).ToUniversalTime().ToString("o")
            release_url = $releaseUrl
            assets = @{
              app = @{
                name = "Xypheronix-Setup.exe"
                download_url = "$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/releases/download/$releaseTag/Xypheronix-Setup.exe"
                sha256 = $hashMap["Xypheronix-Setup.exe"]
                size = (Get-Item "release-assets\Xypheronix-Setup.exe").Length
              }
              portable = @{
                name = "Xypheronix-Windows.zip"
                download_url = "$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/releases/download/$releaseTag/Xypheronix-Windows.zip"
                sha256 = $hashMap["Xypheronix-Windows.zip"]
                size = (Get-Item "release-assets\Xypheronix-Windows.zip").Length
              }
              android = @{
                name = "Xypheronix.apk"
                download_url = "$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/releases/download/$releaseTag/Xypheronix.apk"
                sha256 = $hashMap["Xypheronix.apk"]
                size = (Get-Item "release-assets\Xypheronix.apk").Length
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 10 | Set-Content -Path "release-assets\latest.json" -Encoding UTF8

          # ── Release Notes ──
          $releaseNotes = @()
          $releaseNotes += "## Xypheronix $releaseTag"
          $releaseNotes += ""
          $releaseNotes += "### Release Assets"
          $releaseNotes += "- **Xypheronix-Setup.exe** — Windows installer (includes VC++ Runtime)"
          $releaseNotes += "- **Xypheronix-Windows.zip** — Portable version"
          $releaseNotes += "- **Xypheronix.apk** — Android application package"
          $releaseNotes += "- **latest.json** — Update manifest for auto-updater"
          $releaseNotes += ""
          $releaseNotes += "### SHA-256 Checksums"
          $releaseNotes += $hashLines

          Set-Content -Path "release-assets\release-notes.md" -Value $releaseNotes

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Xypheronix-Release
          path: |
            release-assets/Xypheronix-Setup.exe
            release-assets/Xypheronix-Windows.zip
            release-assets/Xypheronix.apk
            release-assets/latest.json
            release-assets/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-assets/Xypheronix-Setup.exe
            release-assets/Xypheronix-Windows.zip
            release-assets/Xypheronix.apk
            release-assets/latest.json
            release-assets/SHA256SUMS.txt
          body_path: release-assets/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
